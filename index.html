<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickael Gaillard — Digital Arts</title>

  <!-- ── Anti-indexation & protection spiders ── -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, nocache">
  <meta name="googlebot" content="noindex, nofollow, noimageindex">
  <meta name="bingbot" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">

  <!-- ── Polices ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&family=Raleway:wght@200;300;400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- Curseur personnalisé -->
  <div id="cursor"></div>

  <!-- Grain atmosphérique -->
  <div id="grain"></div>

  <!-- Flash + label de transition catégorie -->
  <div id="cat-flash"></div>
  <div id="cat-reveal"></div>

  <!-- ── Header ── -->
  <header id="hdr">
    <span class="hdr-name">Mickael Gaillard</span>
    <div class="hdr-sep"></div>
    <span class="hdr-sub">RÉFRACTIONS</span>
  </header>

  <!-- ── Arc diaporama ── -->
  <div id="slide-indicator" title="Slideshow">
    <svg viewBox="0 0 20 20" width="36" height="36" aria-hidden="true">
      <circle id="slide-track" cx="10" cy="10" r="9" />
      <circle id="slide-progress" cx="10" cy="10" r="9" />
    </svg>
  </div>

  <!-- ── Navigation latérale catégories ── -->
  <nav id="sidebar" aria-label="Catégories">
    <button class="cat-btn" onclick="jumpCat(0)">Photos</button>
    <button class="cat-btn" onclick="jumpCat(1)">Verre</button>
    <button class="cat-btn" onclick="jumpCat(2)">Eau</button>
    <button class="cat-btn" onclick="jumpCat(3)">Papier</button>
    <button class="cat-btn" onclick="jumpCat(5)">Nature</button>
    <button class="cat-btn" onclick="jumpCat(6)">Animaux</button>
    <button class="cat-btn" onclick="jumpCat(7)">Portrait</button>
    <button class="cat-btn" onclick="jumpCat(8)">Fantasy</button>
  </nav>

  <!-- ── Barre basse : points + compteur ── -->
  <div id="btmbar">
    <div id="art-dots" role="tablist"></div>
    <span id="art-counter" aria-live="polite"></span>
  </div>

  <!-- ── Hint navigation (disparaît après 6 s) ── -->
  <div id="hint" aria-hidden="true">
    ← → &thinsp;Images<br>
    ↑ ↓ &thinsp;Categories
  </div>

  <!-- ════════════════════════════════════════════════════════════════════════
       STAGE — grille 2D
       Axe vertical  = catégories
       Axe horizontal = œuvres dans la catégorie

       ┌─ AJOUTER UNE ŒUVRE ──────────────────────────────────────────────┐
       │  1. Trouver le bloc data-id="NOM" souhaité dans le stage          │
       │  2. Dans son <div class="art-rail">, insérer :                   │
       │                                                                   │
       │     <div class="art-frame">                                       │
       │       <img src="data:image/jpeg;base64,BASE64" alt="Titre"       │
       │            loading="lazy">                                        │
       │       <div class="art-overlay"></div>                             │
       │       <div class="art-info">                                      │
       │         <h2 class="art-title">Titre</h2>                         │
       │       </div>                                                      │
       │     </div>                                                        │
       │                                                                   │
       │  → Aucune modification de script.js ni de style.css requise.     │
       └───────────────────────────────────────────────────────────────────┘
  ════════════════════════════════════════════════════════════════════════ -->
  <main id="stage" role="main">

    <section class="cat-row" data-id="photos" data-label="Photos" data-accent="#a8c5d8" style="top:0vh">

            <div class="ph-cross"><span></span><span></span></div>
            <p class="ph-soon">Coming soon</p>
            <p class="ph-sub">Collection in progress</p>
          </div>
        </figure>
      </div>
      <p class="cat-wm">PHOTOS</p>
    </section>
