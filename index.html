<!DOCTYPE html>
<html lang="fr">

<head>

  <!-- ── Anti-indexation & protection spiders ── -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, nocache">
  <meta name="googlebot" content="noindex, nofollow, noimageindex">
  <meta name="bingbot" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">

  <!-- ── Polices ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link

  <link rel="stylesheet" href="assets/css/style.css">

<body class="home">

  <!-- Curseur personnalisé -->

  <!-- Grain atmosphérique -->
  <div id="grain" aria-hidden="true"></div>

  <!-- ══ Carte PHOTOGRAPHIE — haut ══════════════════════════════════════════ -->
  <div class="card-wrap card-wrap--photo">
    <a class="card card--photo" href="pics.html" id="card-photo" aria-label="Photographie — Explorer la galerie">

      <p class="card__wm" aria-hidden="true">PHOTO</p>
      <div class="card__shine" aria-hidden="true"></div>
      <div class="card__bar" aria-hidden="true"></div>

      <div class="card__inner">
        <div class="card__body">
          <h2 class="card__title">Photographie</h2>
          <div class="card__rule"></div>
          <!-- <p class="card__desc">Mimétisme</p> -->
        </div>
        <div class="card__cta" aria-hidden="true">
          <span class="card__cta-label">Explorer</span>
          <span class="card__arrow">→</span>
        </div>
      </div>
    </a>
  </div>

  <!-- ══ Identité ════════════════════════════════════════════════════════════ -->
  <div id="identity" aria-label="Mickael Gaillard — Portfolio">
    <span class="ident-name">Mickael Gaillard</span>
  </div>

  <!-- ══ Carte ARTS NUMÉRIQUES — bas ════════════════════════════════════════ -->
  <div class="card-wrap card-wrap--arts">
    <a class="card card--arts" href="da.html" id="card-arts" aria-label="Arts Numériques — Découvrir les œuvres">

      <div class="card__shine" aria-hidden="true"></div>
      <div class="card__bar" aria-hidden="true"></div>

      <div class="card__inner">
        <div class="card__body">
          <h2 class="card__title">Digital art</h2>
          <div class="card__rule"></div>
          <!-- <p class="card__desc">Réfractions</p> -->
        </div>
        <div class="card__cta" aria-hidden="true">
          <span class="card__cta-label">Découvrir</span>
          <span class="card__arrow">→</span>
        </div>
      </div>
    </a>
  </div>

  <script src="assets/js/script.js"></script>

</html>
